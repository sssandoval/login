<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link  href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="./img/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>Criar Conta</title>
</head>
<body>
    <main class="container">
        <form method="post" action="http://localhost:3000/register" class="login-form">
            <h1>Criar Conta</h1>
            <div class="input-group">
                <input type="email" name="usuario" placeholder="User">
                <i class="bx bxs-user"></i>
            </div>
            <div class="input-group">
                <input type="password" name="senha" placeholder="Password" id="senha">
                <i class="bi bi-eye-fill" id="lock-icon" onclick="mostrarSenha()"></i>
            </div>

            </div>
            <button type="submit" class="login">Criar Conta</button>
        </form>
    </main>
    <script src="main.js"></script>
</body>
</html>
